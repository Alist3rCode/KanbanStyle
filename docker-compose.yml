services:
  app:
    image: ghcr.io/alist3rcode/kanbanstyle:latest
    # Alternative si tu préfères builder depuis les sources (nécessite le
    # dépôt cloné à côté de ce fichier, avec le Dockerfile) :
    # build: .
    ports:
      - "3000:3000"
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - kanbanstyle-data:/app/data
    restart: unless-stopped

volumes:
  kanbanstyle-data:
